<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#c8a982" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c8a982" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#spot)"/>
  <g transform="translate(400,520)">
    <circle r="180" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle r="180" fill="none" stroke="rgba(200,169,130,0.4)" stroke-width="1" stroke-dasharray="2 4"/>
    <text text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="14" letter-spacing="4" fill="#a3a3a3">PORTRAIT</text>
    <text y="24" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="11" letter-spacing="2" fill="#525252">/portrait.jpg</text>
  </g>
  <g transform="translate(40,40)" font-family="ui-monospace, SF Mono, monospace" font-size="10" letter-spacing="2" fill="#737373">
    <text>// CAMILO ARTUNDUAGA</text>
  </g>
  <g transform="translate(40,960)" font-family="ui-monospace, SF Mono, monospace" font-size="10" letter-spacing="2" fill="#525252">
    <text>↑ UPLOAD 800×1000 (4:5) AT /public/portrait.jpg</text>
  </g>
</svg>
